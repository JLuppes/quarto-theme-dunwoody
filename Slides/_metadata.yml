# These are settings for just the slides directory

author: "Dunwoody College of Technology" # Can be overridden on each presentation
theme: [../Themes/dunwoody.scss]
code-overflow: wrap
code-annotations: below
code-block-border-left: false
syntax-highlighting: monokai # Other options: https://quarto.org/docs/output-formats/html-code.html#highlighting
code-line-numbers: false
footer: "&copy; <span id=\"copyright\"><script>document.getElementById('copyright').appendChild(document.createTextNode(new Date().getFullYear()))</script></span> Dunwoody College of Technology" # Keeps the year in footer updated

format:
  revealjs: # This will generate an HTML slideshow
    slide-number: true
    code-block-height: 450px
    # embed-resources: false # during testing
    embed-resources: true # when publishing
    multiplex: true # Produces a 'Speaker' version of the slides
    width: 960
    height: 100%
    margin: 0
    center: false # Center vertically?
    scrollable: true # Vertical overflow becomes scrollable
  pdf: # This creates a pdf file
    toc: true # Table of contents
    number-sections: true
    colorlinks: true
    syntax-highlighting: monokai